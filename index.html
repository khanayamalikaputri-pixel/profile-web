<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    background:
    linear-gradient(rgba(0,0,0,0.6),rgba(0,0,0,0.6)),
    url('background.jpg');
    background-size:cover;
    background-position:center;
    background-repeat:no-repeat;

    display:flex;
    justify-content:center;
    align-items:center;

.card{

.profile-img{

    margin-bottom:15px;
}

h1{
    font-size:28px;
    margin-bottom:8px;
}

.caption{
    color:#d8d8d8;
    margin-bottom:25px;
}

.btn{
    display:block;
    width:100%;
    text-decoration:none;
    background:#25D366;
    color:white;
    padding:14px;
    margin-top:12px;
    border-radius:12px;
    font-weight:bold;
    transition:0.3s;
}

.btn:hover{
    transform:scale(1.03);
}

.footer{
    margin-top:20px;
    font-size:12px;
    color:#bdbdbd;
}
</style>
</head>
